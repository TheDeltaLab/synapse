name: Deploy to Azure

on:
  workflow_run:
    workflows: [Docker]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., sha-abc1234, nightly, latest, v1.0.0)'
        type: string
        default: 'nightly'
      environment:
        description: 'Deployment environment'
        type: choice
        options:
          - test
          - staging
          - production
        default: 'test'
      location:
        description: 'Azure region for deployment'
        type: string
        default: 'koreacentral'

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ inputs.environment || 'test' }}
  cancel-in-progress: false  # Don't cancel in-progress deployments

env:
  # Azure OIDC configuration (set these as repository variables)
  # Note: AZURE_SUBSCRIPTION_ID is set per-environment, not at repo level
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

jobs:
  # Determine deployment parameters
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.params.outputs.image_tag }}
      environment: ${{ steps.params.outputs.environment }}
      resource_group: ${{ steps.params.outputs.resource_group }}
      gateway_app: ${{ steps.params.outputs.gateway_app }}
      dashboard_app: ${{ steps.params.outputs.dashboard_app }}
      should_deploy: ${{ steps.params.outputs.should_deploy }}
      deploy_gateway: ${{ steps.params.outputs.deploy_gateway }}
      deploy_dashboard: ${{ steps.params.outputs.deploy_dashboard }}
      image_prefix: ${{ steps.params.outputs.image_prefix }}
      location: ${{ steps.params.outputs.location }}
    steps:
      - name: Determine deployment parameters
        id: params
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GitHub repository owner may contain uppercase, but OCI requires lowercase
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="ghcr.io/${OWNER_LC}/synapse"

          # Determine if we should deploy
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHOULD_DEPLOY="true"
            IMAGE_TAG="${{ inputs.image_tag }}"
            ENVIRONMENT="${{ inputs.environment }}"
            LOCATION="${{ inputs.location }}"
            # Manual dispatch always deploys both
            DEPLOY_GATEWAY="true"
            DEPLOY_DASHBOARD="true"
          elif [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            SHOULD_DEPLOY="true"
            # Use SHA tag for auto-deploy (more reliable than nightly which may be cached)
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            IMAGE_TAG="sha-${SHORT_SHA}"
            ENVIRONMENT="test"  # Auto-deploy to test only
            LOCATION="koreacentral"  # Default location for auto-deploy

            # Check which images were actually built by querying the Docker workflow jobs
            WORKFLOW_RUN_ID="${{ github.event.workflow_run.id }}"
            echo "Checking Docker workflow run ${WORKFLOW_RUN_ID} for built images..."

            JOBS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/${WORKFLOW_RUN_ID}/jobs" --jq '.jobs[] | {name: .name, conclusion: .conclusion}')
            echo "Docker workflow jobs:"
            echo "$JOBS_JSON"

            DEPLOY_GATEWAY="false"
            DEPLOY_DASHBOARD="false"

            if echo "$JOBS_JSON" | grep -q '"name":"Build Gateway".*"conclusion":"success"'; then
              DEPLOY_GATEWAY="true"
              echo "✅ Gateway image was built, will deploy"
            else
              echo "⏭️ Gateway image was not built (skipped or failed), skipping deploy"
            fi

            if echo "$JOBS_JSON" | grep -q '"name":"Build Dashboard".*"conclusion":"success"'; then
              DEPLOY_DASHBOARD="true"
              echo "✅ Dashboard image was built, will deploy"
            else
              echo "⏭️ Dashboard image was not built (skipped or failed), skipping deploy"
            fi

            # If neither image was built, skip deployment entirely
            if [ "$DEPLOY_GATEWAY" == "false" ] && [ "$DEPLOY_DASHBOARD" == "false" ]; then
              echo "⚠️ No images were built, skipping deployment"
              SHOULD_DEPLOY="false"
            fi
          else
            SHOULD_DEPLOY="false"
            IMAGE_TAG=""
            ENVIRONMENT=""
            LOCATION=""
            DEPLOY_GATEWAY="false"
            DEPLOY_DASHBOARD="false"
          fi

          # Set environment-specific resource names
          case "$ENVIRONMENT" in
            test)
              RESOURCE_GROUP="synapse-test-rg"
              GATEWAY_APP="synapse-gateway-test"
              DASHBOARD_APP="synapse-dashboard-test"
              ;;
            staging)
              RESOURCE_GROUP="synapse-staging-rg"
              GATEWAY_APP="synapse-gateway-staging"
              DASHBOARD_APP="synapse-dashboard-staging"
              ;;
            production)
              RESOURCE_GROUP="synapse-rg"
              GATEWAY_APP="synapse-gateway"
              DASHBOARD_APP="synapse-dashboard"
              ;;
            *)
              RESOURCE_GROUP=""
              GATEWAY_APP=""
              DASHBOARD_APP=""
              ;;
          esac

          # Output all parameters
          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "deploy_gateway=$DEPLOY_GATEWAY" >> $GITHUB_OUTPUT
          echo "deploy_dashboard=$DEPLOY_DASHBOARD" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "resource_group=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "gateway_app=$GATEWAY_APP" >> $GITHUB_OUTPUT
          echo "dashboard_app=$DASHBOARD_APP" >> $GITHUB_OUTPUT
          echo "image_prefix=$IMAGE_PREFIX" >> $GITHUB_OUTPUT
          echo "location=$LOCATION" >> $GITHUB_OUTPUT

          # Log for debugging
          echo "## Deployment Parameters" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENVIRONMENT |" >> $GITHUB_STEP_SUMMARY
          echo "| Location | $LOCATION |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | $IMAGE_TAG |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Prefix | $IMAGE_PREFIX |" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | $RESOURCE_GROUP |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway App | $GATEWAY_APP |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard App | $DASHBOARD_APP |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Gateway | $DEPLOY_GATEWAY |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Dashboard | $DEPLOY_DASHBOARD |" >> $GITHUB_STEP_SUMMARY

  deploy-gateway:
    name: Deploy Gateway (${{ needs.prepare.outputs.environment }})
    runs-on: ubuntu-latest
    needs: prepare
    if: |
      needs.prepare.outputs.should_deploy == 'true' &&
      needs.prepare.outputs.deploy_gateway == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      id-token: write  # Required for OIDC authentication
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # IMPORTANT: Use `az containerapp update` directly instead of azure/container-apps-deploy-action.
      # The GitHub Action internally calls `az containerapp up`, which requires broad permissions
      # (e.g., managing environments, registries) and causes 'Forbidden' errors with OIDC credentials
      # that only have Container App-level access. Do NOT replace this with the GitHub Action.
      - name: Deploy Gateway to Container Apps
        run: |
          az containerapp update \
            --name ${{ needs.prepare.outputs.gateway_app }} \
            --resource-group ${{ needs.prepare.outputs.resource_group }} \
            --image ${{ needs.prepare.outputs.image_prefix }}/gateway:${{ needs.prepare.outputs.image_tag }}
          az containerapp ingress update \
            --name ${{ needs.prepare.outputs.gateway_app }} \
            --resource-group ${{ needs.prepare.outputs.resource_group }} \
            --target-port 3000

      - name: Verify deployment
        run: |
          echo "✅ Gateway deployed to ${{ needs.prepare.outputs.environment }}"
          echo "   Image: ${{ needs.prepare.outputs.image_prefix }}/gateway:${{ needs.prepare.outputs.image_tag }}"
          echo "   App: ${{ needs.prepare.outputs.gateway_app }}"

  deploy-dashboard:
    name: Deploy Dashboard (${{ needs.prepare.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [prepare, deploy-gateway]
    if: |
      always() &&
      needs.prepare.outputs.should_deploy == 'true' &&
      needs.prepare.outputs.deploy_dashboard == 'true' &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped')
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      id-token: write  # Required for OIDC authentication
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # IMPORTANT: Use `az containerapp update` directly instead of azure/container-apps-deploy-action.
      # The GitHub Action internally calls `az containerapp up`, which requires broad permissions
      # (e.g., managing environments, registries) and causes 'Forbidden' errors with OIDC credentials
      # that only have Container App-level access. Do NOT replace this with the GitHub Action.
      - name: Deploy Dashboard to Container Apps
        run: |
          az containerapp update \
            --name ${{ needs.prepare.outputs.dashboard_app }} \
            --resource-group ${{ needs.prepare.outputs.resource_group }} \
            --image ${{ needs.prepare.outputs.image_prefix }}/dashboard:${{ needs.prepare.outputs.image_tag }} \
            --set-env-vars GATEWAY_URL=${{ vars.GATEWAY_URL }}
          az containerapp ingress update \
            --name ${{ needs.prepare.outputs.dashboard_app }} \
            --resource-group ${{ needs.prepare.outputs.resource_group }} \
            --target-port 3001

      - name: Verify deployment
        run: |
          echo "✅ Dashboard deployed to ${{ needs.prepare.outputs.environment }}"
          echo "   Image: ${{ needs.prepare.outputs.image_prefix }}/dashboard:${{ needs.prepare.outputs.image_tag }}"
          echo "   App: ${{ needs.prepare.outputs.dashboard_app }}"

  health-check:
    name: Health Check (${{ needs.prepare.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [prepare, deploy-gateway, deploy-dashboard]
    if: |
      always() &&
      needs.prepare.outputs.should_deploy == 'true' &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') &&
      (needs.deploy-dashboard.result == 'success' || needs.deploy-dashboard.result == 'skipped') &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-dashboard.result == 'success')
    env:
      # Environment-specific URLs (set via GitHub Environment variables)
      GATEWAY_URL: ${{ vars.GATEWAY_URL }}
      DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
    steps:
      - name: Wait for containers to start
        run: sleep 15

      - name: Check Gateway Health
        if: needs.deploy-gateway.result == 'success'
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 10
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            GATEWAY_URL="${{ vars.GATEWAY_URL }}"
            if [ -z "$GATEWAY_URL" ]; then
              echo "⚠️ GATEWAY_URL not set for environment, skipping health check"
              exit 0
            fi
            response=$(curl -s -o /dev/null -w "%{http_code}" "${GATEWAY_URL}/health")
            if [ "$response" != "200" ]; then
              echo "❌ Gateway health check failed with status: $response"
              exit 1
            fi
            echo "✅ Gateway health check passed"

      - name: Check Dashboard Health
        if: needs.deploy-dashboard.result == 'success'
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 10
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            DASHBOARD_URL="${{ vars.DASHBOARD_URL }}"
            if [ -z "$DASHBOARD_URL" ]; then
              echo "⚠️ DASHBOARD_URL not set for environment, skipping health check"
              exit 0
            fi
            response=$(curl -s -o /dev/null -w "%{http_code}" "${DASHBOARD_URL}/")
            if [ "$response" != "200" ]; then
              echo "❌ Dashboard health check failed with status: $response"
              exit 1
            fi
            echo "✅ Dashboard health check passed"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ needs.prepare.outputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-gateway.result }}" == "success" ]; then
            echo "| Gateway | \`${{ needs.prepare.outputs.image_prefix }}/gateway:${{ needs.prepare.outputs.image_tag }}\` | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Gateway | — | ⏭️ Skipped (no new image) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-dashboard.result }}" == "success" ]; then
            echo "| Dashboard | \`${{ needs.prepare.outputs.image_prefix }}/dashboard:${{ needs.prepare.outputs.image_tag }}\` | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Dashboard | — | ⏭️ Skipped (no new image) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group:** \`${{ needs.prepare.outputs.resource_group }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Location:** \`${{ needs.prepare.outputs.location }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway App:** \`${{ needs.prepare.outputs.gateway_app }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard App:** \`${{ needs.prepare.outputs.dashboard_app }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ vars.GATEWAY_URL }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### URLs" >> $GITHUB_STEP_SUMMARY
            echo "- Gateway: ${{ vars.GATEWAY_URL }}" >> $GITHUB_STEP_SUMMARY
            echo "- Dashboard: ${{ vars.DASHBOARD_URL }}" >> $GITHUB_STEP_SUMMARY
          fi
