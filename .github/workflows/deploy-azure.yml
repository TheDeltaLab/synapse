name: Deploy to Azure

on:
  workflow_run:
    workflows: [Docker]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., nightly, stable, v1.0.0)'
        type: string
        default: 'nightly'

jobs:
  deploy-gateway:
    name: Deploy Gateway
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=nightly" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Gateway to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/synapse-gateway:${{ steps.tag.outputs.tag }}
          containerAppName: synapse-gateway
          resourceGroup: synapse-rg
          envVars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            NODE_ENV=production

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: deploy-gateway
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=nightly" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Dashboard to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/synapse-dashboard:${{ steps.tag.outputs.tag }}
          containerAppName: synapse-dashboard
          resourceGroup: synapse-rg
          envVars: |
            NODE_ENV=production

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-gateway, deploy-dashboard]
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check Gateway Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.GATEWAY_URL }}/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Gateway health check failed with status: $response"
            exit 1
          fi
          echo "Gateway health check passed"

      - name: Check Dashboard Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.DASHBOARD_URL }}/" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Dashboard health check failed with status: $response"
            exit 1
          fi
          echo "Dashboard health check passed"
