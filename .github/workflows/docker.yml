name: Docker

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '**/Dockerfile'
      - '.github/workflows/docker.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registry'
        type: boolean
        default: true
      platforms:
        description: 'Target platforms'
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
        default: 'linux/amd64'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  REGISTRY: ghcr.io
  # Use lowercase for OCI compliance - hierarchical namespace for multi-image project
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/synapse

jobs:
  # Detect which apps have changed to enable selective builds
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'apps/gateway/**'
              - 'packages/shared/**'
              - 'packages/dal/**'
              - 'packages/config/**'
              - 'pnpm-lock.yaml'
              - 'apps/gateway/Dockerfile'
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'apps/dashboard/Dockerfile'

  build-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    needs: changes
    # Build if: release, manual trigger, or gateway files changed
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.gateway == 'true'
    permissions:
      contents: read
      packages: write
      # Required for attestations
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/gateway
          tags: |
            # nightly tag for main branch pushes
            type=raw,value=nightly,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            # latest tag for releases
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # semver tags for releases (v1.2.3, v1.2, v1)
            type=semver,pattern=v{{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{major}},enable=${{ github.event_name == 'release' && !startsWith(github.ref, 'refs/tags/v0.') }}
            # sha tag for traceability
            type=sha,prefix=sha-,format=short
            # branch name for feature branches
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Synapse Gateway
            org.opencontainers.image.description=AI Gateway API - OpenAI-compatible LLM routing with fallback strategies
            org.opencontainers.image.vendor=Synapse
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gateway/Dockerfile
          platforms: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance for supply chain security
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        if: github.event_name != 'workflow_dispatch' || inputs.push
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/gateway
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: changes
    # Build if: release, manual trigger, or dashboard files changed
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.dashboard == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/dashboard
          tags: |
            type=raw,value=nightly,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{major}},enable=${{ github.event_name == 'release' && !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Synapse Dashboard
            org.opencontainers.image.description=Admin dashboard for Synapse AI Gateway
            org.opencontainers.image.vendor=Synapse
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          platforms: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=${{ vars.GATEWAY_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        if: github.event_name != 'workflow_dispatch' || inputs.push
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/dashboard
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Summary job for branch protection rules
  docker-success:
    name: Docker Build Success
    runs-on: ubuntu-latest
    needs: [changes, build-gateway, build-dashboard]
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.build-gateway.result }}" == "success" ]]; then
            echo "✅ **Gateway**: Built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   - Digest: \`${{ needs.build-gateway.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.build-gateway.result }}" == "skipped" ]]; then
            echo "⏭️ **Gateway**: Skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Gateway**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.build-dashboard.result }}" == "success" ]]; then
            echo "✅ **Dashboard**: Built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   - Digest: \`${{ needs.build-dashboard.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.build-dashboard.result }}" == "skipped" ]]; then
            echo "⏭️ **Dashboard**: Skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Dashboard**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Start" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_PREFIX }}/gateway:nightly" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_PREFIX }}/dashboard:nightly" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any build failed
        if: |
          (needs.build-gateway.result == 'failure') ||
          (needs.build-dashboard.result == 'failure')
        run: exit 1
