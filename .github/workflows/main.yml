name: Synapse CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'configs/**'
      - 'infrastructure/**'

jobs:
  # Task 1: Sync JSON routing logic to Portkey Control Plane
  sync-portkey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Configs via Portkey API
        env:
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_ORG_KEY }}
        run: |
          for file in configs/*.json; do
            echo "Uploading $file..."
            curl -X POST "https://api.portkey.ai/v1/configs" \
              -H "x-portkey-api-key: $PORTKEY_API_KEY" \
              -H "Content-Type: application/json" \
              -d @"$file"
          done

  # Task 2: Deploy/Update the Gateway in Azure
  deploy-azure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: portkeyai/gateway:latest
          containerAppName: synapse-gateway
          resourceGroup: synapse-rg
          # Environment variables for the Gateway
          envVars: |
            PORTKEY_API_KEY=${{ secrets.PORTKEY_ORG_KEY }}
            REDIS_URL=${{ secrets.REDIS_URL }}