name: synapse-dashboard
type: KubernetesApp

dependencies:
  - resource: KubernetesServiceAccount.synapse-workload-sa
    isHardDependency: true
  - resource: KubernetesService.synapse-gateway
    isHardDependency: true
  - resource: KubernetesConfigMap.synapse-shared-config
    isHardDependency: true
  - resource: KubernetesManifest.synapse-secret-provider
    isHardDependency: true
  - resource: AzureServicePrincipal.synapse-aad
    isHardDependency: true

defaultConfig:
  namespace: synapse
  image: ghcr.io/thedeltalab/synapse/dashboard:nightly
  port: 3001
  serviceAccountName: synapse-workload-sa
  secretProvider: synapse-secret-provider
  resources:
    cpuRequest: "250m"
    memoryRequest: 256Mi
    cpuLimit: "500m"
    memoryLimit: 512Mi
  envFrom:
    - configMapRef: synapse-shared-config
    - secretRef: synapse-shared-secrets
  envVars:
    - APP_ENV=${ this.ring }
  ingress:
    subdomain: synapse
    dnsZone: thebrainly.dev
    annotations:
      nginx.ingress.kubernetes.io/auth-url: "https://$host/oauth2/auth"
      nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
      nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email"
    dependencies:
      - resource: KubernetesIngress.synapse-oauth2-proxy
        isHardDependency: true
