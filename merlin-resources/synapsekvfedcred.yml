name: synapse-kv-workload
type: AzureFederatedCredential
project: synapse
ring:
  - test
  - staging

authProvider:
  name: AzureEntraID

# Federated credential for synapse-workload-sa via Azure Workload Identity.
# credentialName matches merlin/shared-k8s-resource/sharedkvsp.yml.
dependencies:
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: KubernetesCluster.aks
    isHardDependency: true

defaultConfig:
  servicePrincipal: kv-workload
  credentialName: synapse-sa
  issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
  subject: system:serviceaccount:synapse:synapse-workload-sa

specificConfig: []

exports: {}
