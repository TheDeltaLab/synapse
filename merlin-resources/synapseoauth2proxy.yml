name: synapse-oauth2-proxy
type: KubernetesApp

dependencies:
  - resource: KubernetesManifest.synapse-oauth2-proxy-secret-provider
    isHardDependency: true
  - resource: KubernetesServiceAccount.synapse-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.synapse-aad
    isHardDependency: true

defaultConfig:
  namespace: synapse
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
  port: 4180
  serviceAccountName: synapse-workload-sa
  secretProvider: synapse-oauth2-proxy-secret-provider
  resources:
    cpuRequest: "100m"
    memoryRequest: "128Mi"
    cpuLimit: "200m"
    memoryLimit: "256Mi"
  probes:
    liveness: false
    startup: false
    readiness:
      httpGet:
        path: /ping
        port: 4180
  envFrom:
    - secretRef: synapse-oauth2-proxy-secrets
  envVars:
    - OAUTH2_PROXY_PROVIDER=oidc
    - OAUTH2_PROXY_OIDC_ISSUER_URL=https://login.microsoftonline.com/2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4/v2.0
    - OAUTH2_PROXY_CLIENT_ID=${ AzureServicePrincipal.synapse-aad.clientId }
    - OAUTH2_PROXY_REDIRECT_URL=https://synapse.${ this.ring }.thebrainly.dev/oauth2/callback
    - OAUTH2_PROXY_UPSTREAM=static://202
    - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
    - OAUTH2_PROXY_EMAIL_DOMAINS=*
    - OAUTH2_PROXY_SCOPE=openid email profile
    - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
    - OAUTH2_PROXY_PASS_ACCESS_TOKEN=true
    - OAUTH2_PROXY_OIDC_EMAIL_CLAIM=preferred_username
    - OAUTH2_PROXY_SET_XAUTHREQUEST=true
  ingress:
    subdomain: synapse
    dnsZone: thebrainly.dev
    path: /oauth2
    bindDnsZone: false
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
      nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
