name: synapse-oauth2-proxy-secret-provider
type: KubernetesManifest

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.synapse-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  namespace: synapse
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: synapse-oauth2-proxy-secret-provider
      namespace: synapse
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.name }
        tenantId: "2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4"
        objects: |
          array:
            - |
              objectName: synapse-oauth2-proxy-client-secret
              objectType: secret
            - |
              objectName: synapse-oauth2-proxy-cookie-secret
              objectType: secret
      secretObjects:
        - secretName: synapse-oauth2-proxy-secrets
          type: Opaque
          data:
            - objectName: synapse-oauth2-proxy-client-secret
              key: OAUTH2_PROXY_CLIENT_SECRET
            - objectName: synapse-oauth2-proxy-cookie-secret
              key: OAUTH2_PROXY_COOKIE_SECRET
