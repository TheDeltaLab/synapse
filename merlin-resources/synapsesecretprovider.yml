name: synapse-secret-provider
type: KubernetesManifest

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.synapse-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  namespace: synapse
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: synapse-secret-provider
      namespace: synapse
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.name }
        tenantId: 2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4
        objects: |
          array:
            - |
              objectName: database-url-synpase
              objectType: secret
            - |
              objectName: synapse-redis-url
              objectType: secret
            - |
              objectName: openai-compatible-api-key
              objectType: secret
            - |
              objectName: openrouter-api-key
              objectType: secret
            - |
              objectName: synapse-encryption-key
              objectType: secret
            - |
              objectName: synapse-jwt-key
              objectType: secret
            - |
              objectName: synapse-upstash-redis-url
              objectType: secret
            - |
              objectName: synapse-upstash-redis-token
              objectType: secret
            - |
              objectName: deepseek-api-key
              objectType: secret
            - |
              objectName: alibaba-key
              objectType: secret
      secretObjects:
        - secretName: synapse-shared-secrets
          type: Opaque
          data:
            - objectName: database-url-synpase
              key: DATABASE_URL
            - objectName: synapse-redis-url
              key: REDIS_URL
            - objectName: openai-compatible-api-key
              key: OPENAI_COMPATIBLE_API_KEY
            - objectName: openrouter-api-key
              key: OPENROUTER_API_KEY
            - objectName: synapse-encryption-key
              key: ENCRYPTION_KEY
            - objectName: synapse-jwt-key
              key: JWT_SECRET
            - objectName: synapse-upstash-redis-url
              key: UPSTASH_REDIS_REST_URL
            - objectName: synapse-upstash-redis-token
              key: UPSTASH_REDIS_REST_TOKEN
            - objectName: deepseek-api-key
              key: DEEPSEEK_API_KEY
            - objectName: alibaba-key
              key: ALIBABA_API_KEY
