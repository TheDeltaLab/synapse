name: synapse-shared-config
type: KubernetesConfigMap

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: AzureRedisEnterprise.synapse-redis
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true

defaultConfig:
  namespace: synapse
  data:
    NODE_ENV: development
    GATEWAY_URL: http://synapse-gateway.synapse.svc.cluster.local:3000
    OPENAI_COMPATIBLE_API_BASE_URL: https://openrouter.ai/api/v1
    REDIS_URL: ${ AzureRedisEnterprise.synapse-redis.redisUrl }
    REDIS_USER: ${ AzureServicePrincipal.kv-workload.objectId }
    REDIS_AUTH: AZURE_ENTRA_ID
    CACHE_TTL: "604800"
    ALIBABA_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode
    OTEL_SERVICE_NAME: synapse-gateway
    # OTEL collector lives in the `observability` namespace, not `trinity`.
    # The previous value pointed at a non-existent service, so all synapse
    # OTLP traffic was being silently dropped (DNS NXDOMAIN, exporter is
    # fail-open).
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-gateway.observability.svc.cluster.local:4318
  labels:
    app.kubernetes.io/part-of: synapse
    managed-by: merlin
