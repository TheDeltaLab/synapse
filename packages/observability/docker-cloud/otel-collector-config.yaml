extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Loki 3.x OTLP endpoint: /otlp/v1/logs (not /v1/logs)
  # The otlphttp exporter appends /v1/logs, so we add /otlp to the base endpoint.
  otlphttp/loki:
    endpoint: ${env:LOKI_ENDPOINT}/otlp

  # Tempo's OTLP receiver on port 4318 natively serves /v1/traces — no prefix needed.
  otlphttp/tempo:
    endpoint: ${env:TEMPO_ENDPOINT}

  # Mimir OTLP endpoint: /otlp/v1/metrics (not /v1/metrics)
  otlphttp/mimir:
    endpoint: ${env:MIMIR_ENDPOINT}/otlp

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      exporters: [otlphttp/tempo]
    metrics:
      receivers: [otlp]
      exporters: [otlphttp/mimir, debug]
