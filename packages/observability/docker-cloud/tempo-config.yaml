server:
  http_listen_port: 3200

storage:
  trace:
    backend: azure
    azure:
      container_name: ${AZURE_STORAGE_CONTAINER_NAME_TEMPO}
      storage_account_name: ${AZURE_STORAGE_ACCOUNT_NAME}
      use_managed_identity: true
    wal:
      path: /var/tempo/wal

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# query_frontend enables JSON response for /api/traces/{traceID}.
# Without this, Tempo only returns protobuf, causing Grafana "Not Found" errors
# because Grafana's Tempo plugin requests Accept: application/json.
query_frontend:
  search:
    default_result_limit: 20
