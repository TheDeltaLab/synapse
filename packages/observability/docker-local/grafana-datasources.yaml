apiVersion: 1

deleteDatasources:
  - name: Loki
  - name: Tempo
  - name: Mimir

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherType: label
          matcherName: trace_id
          name: TraceID
          urlDisplayLabel: View in Tempo

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
      lokiSearch:
        datasourceUid: loki
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: mimir

  - name: Mimir
    uid: mimir
    type: prometheus
    access: proxy
    url: http://mimir:8080/prometheus
    editable: true
    jsonData:
      httpMethod: POST
