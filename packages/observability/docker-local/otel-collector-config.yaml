receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  otlphttp/tempo:
    endpoint: http://tempo:4318

  otlphttp/mimir:
    endpoint: http://mimir:8080/otlp

  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [otlphttp/loki, debug]
    traces:
      receivers: [otlp]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp]
      exporters: [otlphttp/mimir, debug]
