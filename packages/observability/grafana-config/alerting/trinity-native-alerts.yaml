apiVersion: 1

groups:
  - orgId: 1
    name: Trinity Native App
    folder: Trinity
    interval: 1m
    rules:
      # 1. Error count spike - 5min error rate > 0.5/s
      - uid: native-error-rate-high
        title: "Native: Error Rate High"
        condition: error_rate_threshold
        data:
          - refId: error_rate
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              expr: sum(rate(app_error_count{job="native"}[5m]))
              instant: true
              refId: error_rate
          - refId: error_rate_prev
            relativeTimeRange:
              from: 600
              to: 300
            datasourceUid: mimir
            model:
              expr: sum(rate(app_error_count{job="native"}[5m]))
              instant: true
              refId: error_rate_prev
          - refId: error_rate_threshold
            datasourceUid: __expr__
            model:
              type: threshold
              expression: error_rate
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          __dashboardUid__: trinity-native
          summary: "Native app error rate is {{ $values.error_rate }} errors/s (threshold: 0.5/s)"
          description: "Error rate has been elevated for 5 minutes. Check the Trinity Native App dashboard for error type breakdown."
          dashboard_url: "/d/trinity-native"
        labels:
          severity: warning
          app: native
          category: error

      # 2. Error count spike - critical (> 2/s sustained)
      - uid: native-error-rate-critical
        title: "Native: Error Rate Critical"
        condition: error_rate_threshold
        data:
          - refId: error_rate
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              expr: sum(rate(app_error_count{job="native"}[5m]))
              instant: true
              refId: error_rate
          - refId: error_rate_threshold
            datasourceUid: __expr__
            model:
              type: threshold
              expression: error_rate
              conditions:
                - evaluator:
                    type: gt
                    params: [2]
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          __dashboardUid__: trinity-native
          summary: "CRITICAL: Native app error rate is {{ $values.error_rate }} errors/s (threshold: 2/s)"
          description: "Error rate is critically high. Immediate attention required."
          dashboard_url: "/d/trinity-native"
        labels:
          severity: critical
          app: native
          category: error

      # 3. HTTP error rate > 20%
      - uid: native-http-error-rate
        title: "Native: HTTP Error Rate > 20%"
        condition: http_error_pct_threshold
        data:
          - refId: http_error_pct
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              expr: >
                100 * sum(rate(http_client_request_count{job="native", http_status_code=~"[45].*"}[5m]))
                / clamp_min(sum(rate(http_client_request_count{job="native"}[5m])), 0.001)
              instant: true
              refId: http_error_pct
          - refId: http_error_pct_threshold
            datasourceUid: __expr__
            model:
              type: threshold
              expression: http_error_pct
              conditions:
                - evaluator:
                    type: gt
                    params: [20]
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          __dashboardUid__: trinity-native
          summary: "Native HTTP error rate is {{ $values.http_error_pct }}% (threshold: 20%)"
          description: "More than 20% of HTTP requests are failing. Check API health and network connectivity."
          dashboard_url: "/d/trinity-native"
        labels:
          severity: warning
          app: native
          category: http

      # 4. HTTP p99 latency > 5s
      - uid: native-http-latency-high
        title: "Native: HTTP p99 Latency > 5s"
        condition: latency_p99_threshold
        data:
          - refId: latency_p99
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              expr: histogram_quantile(0.99, sum by (le) (rate(http_client_request_duration_bucket{job="native"}[5m])))
              instant: true
              refId: latency_p99
          - refId: latency_p99_threshold
            datasourceUid: __expr__
            model:
              type: threshold
              expression: latency_p99
              conditions:
                - evaluator:
                    type: gt
                    params: [5000]
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          __dashboardUid__: trinity-native
          summary: "Native HTTP p99 latency is {{ $values.latency_p99 }}ms (threshold: 5000ms)"
          description: "HTTP requests are experiencing high tail latency."
          dashboard_url: "/d/trinity-native"
        labels:
          severity: warning
          app: native
          category: latency

      # 5. BLE failure rate > 30%
      - uid: native-ble-failure-rate
        title: "Native: BLE Failure Rate > 30%"
        condition: ble_failure_pct_threshold
        data:
          - refId: ble_failure_pct
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              expr: >
                100 * sum(rate(ble_operation_count{job="native", success="false"}[5m]))
                / clamp_min(sum(rate(ble_operation_count{job="native"}[5m])), 0.001)
              instant: true
              refId: ble_failure_pct
          - refId: ble_failure_pct_threshold
            datasourceUid: __expr__
            model:
              type: threshold
              expression: ble_failure_pct
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          __dashboardUid__: trinity-native
          summary: "BLE failure rate is {{ $values.ble_failure_pct }}% (threshold: 30%)"
          description: "BLE operations are failing at a high rate. Check device connectivity."
          dashboard_url: "/d/trinity-native"
        labels:
          severity: warning
          app: native
          category: ble
